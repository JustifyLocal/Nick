# Ted Sink Law Lead Qualification Rules
# Defines criteria for qualifying potential clients and cases

qualification_criteria:
  geographic:
    required_states:
      - "South Carolina"
      - "Georgia"
    disqualifying_states:
      - "Florida"
      - "North Carolina"
      - "Tennessee"
      - "Alabama"
      - "Virginia"
      - "All other states"
    description: "Must be resident of South Carolina or Georgia"

  case_type:
    required: "Personal injury cases only"
    disqualifying_types:
      - "criminal"
      - "family law"
      - "business law"
      - "real estate"
      - "estate planning"
      - "bankruptcy"
      - "immigration"
    description: "Must be personal injury case"

  timeline:
    required: "Within statute of limitations"
    disqualifying: "Outside statute of limitations"
    description: "Case must be within legal time limits"

  damages:
    required: "Significant damages or medical treatment"
    disqualifying: "Minimal or no damages"
    description: "Must have meaningful damages to pursue"

  liability:
    required: "Clear liability or strong case"
    disqualifying: "Unclear liability or weak case"
    description: "Must have reasonable chance of success"

emergency_indicators:
  critical:
    - "life-threatening"
    - "critical condition"
    - "emergency room"
    - "ambulance"
    - "severe bleeding"
    - "unconscious"
    - "not breathing"
    - "heart attack"
    - "stroke"
    - "major trauma"

  urgent:
    - "serious injury"
    - "broken bones"
    - "head injury"
    - "hospital"
    - "surgery"
    - "immediate"
    - "right now"
    - "asap"
    - "urgent"

  high_priority:
    - "severe pain"
    - "significant injury"
    - "medical bills"
    - "lost wages"
    - "serious accident"
    - "major damages"

high_priority_indicators:
  - "wrongful death"
  - "fatal"
  - "death"
  - "serious injury"
  - "permanent disability"
  - "significant medical bills"
  - "lost wages"
