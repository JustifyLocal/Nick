version: '3.8'

services:
  # Ted Sink Law Voice Receptionist AI
  voice-ai:
    build: .
    container_name: ted-sink-law-voice-ai
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ted_sink_user:ted_sink_password@postgres:5432/ted_sink_law
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ENVIRONMENT=production
      - LOG_LEVEL=info
    volumes:
      - ./logs:/var/log
      - ./audio_files:/tmp/audio_files
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ted-sink-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ted-sink-law-db
    environment:
      - POSTGRES_DB=ted_sink_law
      - POSTGRES_USER=ted_sink_user
      - POSTGRES_PASSWORD=ted_sink_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ted-sink-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: ted-sink-law-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ted-sink-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ted-sink-law-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - voice-ai
    restart: unless-stopped
    networks:
      - ted-sink-network

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ted-sink-law-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - ted-sink-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: ted-sink-law-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ted-sink-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ted-sink-network:
    driver: bridge